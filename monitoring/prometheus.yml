global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: fastapi
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: celery
    static_configs:
      - targets: ["celery:9191"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
